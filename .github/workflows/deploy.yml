name: Deploy Production

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'
  DEFAULT_CPANEL_APP_PATH: /home/egyptdoudou/dudu_app
  DEFAULT_CPANEL_PUBLIC_PATH: /home/egyptdoudou/public_html

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      APP_ENV: testing
      APP_DEBUG: false
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      SCOUT_DRIVER: collection

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, ctype, curl, dom, fileinfo, json, mbstring, openssl, pdo, pdo_sqlite, sqlite3, tokenizer, xml, zip
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-dev-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-dev-
            ${{ runner.os }}-composer-

      - name: Prepare Laravel runtime
        run: |
          set -euo pipefail
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views bootstrap/cache
          touch database/database.sqlite

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Validate Laravel boot and views
        run: |
          set -euo pipefail
          php artisan config:clear
          php artisan migrate --force
          php artisan view:cache

      - name: Run PHP tests
        run: php artisan test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

  deploy:
    name: Build and deploy to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, ctype, curl, dom, fileinfo, json, mbstring, openssl, pdo, tokenizer, xml, zip
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies (production)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare split-deployment public index.php
        env:
          CPANEL_APP_PATH: ${{ secrets.CPANEL_APP_PATH }}
          CPANEL_PUBLIC_PATH: ${{ secrets.CPANEL_PUBLIC_PATH }}
        run: |
          set -euo pipefail
          APP_PATH="${CPANEL_APP_PATH:-$DEFAULT_CPANEL_APP_PATH}"
          PUBLIC_PATH="${CPANEL_PUBLIC_PATH:-$DEFAULT_CPANEL_PUBLIC_PATH}"
          APP_REL="$(python3 -c "import os; print(os.path.relpath('${APP_PATH}', '${PUBLIC_PATH}'))")"
          echo "App relative path from public_html: ${APP_REL}"
          sed "s|__APP_BASE__|${APP_REL}|g" deploy/templates/public-index.php.stub > public/index.php.cpanel
          if grep -q '__APP_BASE__' public/index.php.cpanel; then
            echo "Failed to generate public index.php"
            exit 1
          fi

      - name: Validate deployment secrets
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${CPANEL_HOST:-}" ] && missing+=("CPANEL_HOST")
          [ -z "${CPANEL_PORT:-}" ] && missing+=("CPANEL_PORT")
          [ -z "${CPANEL_USER:-}" ] && missing+=("CPANEL_USER")
          [ -z "${CPANEL_SSH_KEY:-}" ] && missing+=("CPANEL_SSH_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Add server to known_hosts
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
        run: |
          set -euo pipefail
          PORT="${CPANEL_PORT:-6802}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "${PORT}" -H "${CPANEL_HOST}" >> ~/.ssh/known_hosts

      - name: Ensure remote directories exist
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_APP_PATH: ${{ secrets.CPANEL_APP_PATH }}
          CPANEL_PUBLIC_PATH: ${{ secrets.CPANEL_PUBLIC_PATH }}
        run: |
          set -euo pipefail
          PORT="${CPANEL_PORT:-6802}"
          APP_PATH="${CPANEL_APP_PATH:-$DEFAULT_CPANEL_APP_PATH}"
          PUBLIC_PATH="${CPANEL_PUBLIC_PATH:-$DEFAULT_CPANEL_PUBLIC_PATH}"
          ssh -p "${PORT}" "${CPANEL_USER}@${CPANEL_HOST}" \
            "mkdir -p '${APP_PATH}' '${PUBLIC_PATH}' '${APP_PATH}/storage' '${APP_PATH}/bootstrap/cache'"

      - name: Deploy application to cPanel via SCP
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_APP_PATH: ${{ secrets.CPANEL_APP_PATH }}
        run: |
          set -euo pipefail
          PORT="${CPANEL_PORT:-6802}"
          APP_PATH="${CPANEL_APP_PATH:-$DEFAULT_CPANEL_APP_PATH}"
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='.env' \
              --exclude='storage/framework/cache' \
              --exclude='storage/framework/sessions' \
              --exclude='storage/framework/views' \
              --exclude='storage/logs' \
              --exclude='public/storage' \
              -czf /tmp/app.tar.gz .
          scp -P "${PORT}" -o BatchMode=yes /tmp/app.tar.gz \
            "${CPANEL_USER}@${CPANEL_HOST}:/tmp/dudu-app.tar.gz"
          ssh -p "${PORT}" "${CPANEL_USER}@${CPANEL_HOST}" \
            "mkdir -p '${APP_PATH}' && tar -xzf /tmp/dudu-app.tar.gz -C '${APP_PATH}' && rm -f /tmp/dudu-app.tar.gz"

      - name: Deploy public assets to public_html via SCP
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_PUBLIC_PATH: ${{ secrets.CPANEL_PUBLIC_PATH }}
        run: |
          set -euo pipefail
          PORT="${CPANEL_PORT:-6802}"
          PUBLIC_PATH="${CPANEL_PUBLIC_PATH:-$DEFAULT_CPANEL_PUBLIC_PATH}"
          tar --exclude='storage/' \
              -czf /tmp/public.tar.gz -C public .
          scp -P "${PORT}" -o BatchMode=yes /tmp/public.tar.gz \
            "${CPANEL_USER}@${CPANEL_HOST}:/tmp/dudu-public.tar.gz"
          ssh -p "${PORT}" "${CPANEL_USER}@${CPANEL_HOST}" \
            "mkdir -p '${PUBLIC_PATH}' && tar -xzf /tmp/dudu-public.tar.gz -C '${PUBLIC_PATH}' && rm -f /tmp/dudu-public.tar.gz"

      - name: Deploy split-deployment index.php
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_PUBLIC_PATH: ${{ secrets.CPANEL_PUBLIC_PATH }}
        run: |
          set -euo pipefail
          PORT="${CPANEL_PORT:-6802}"
          PUBLIC_PATH="${CPANEL_PUBLIC_PATH:-$DEFAULT_CPANEL_PUBLIC_PATH}"
          scp -P "${PORT}" -o BatchMode=yes public/index.php.cpanel \
            "${CPANEL_USER}@${CPANEL_HOST}:${PUBLIC_PATH}/index.php"

      - name: Run post-deploy commands on server
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_APP_PATH: ${{ secrets.CPANEL_APP_PATH }}
          CPANEL_PUBLIC_PATH: ${{ secrets.CPANEL_PUBLIC_PATH }}
        run: |
          set -euo pipefail
          PORT="${CPANEL_PORT:-6802}"
          APP_PATH="${CPANEL_APP_PATH:-$DEFAULT_CPANEL_APP_PATH}"
          PUBLIC_PATH="${CPANEL_PUBLIC_PATH:-$DEFAULT_CPANEL_PUBLIC_PATH}"
          scp -P "${PORT}" -o BatchMode=yes deploy/scripts/post-deploy.sh \
            "${CPANEL_USER}@${CPANEL_HOST}:/tmp/dudu-post-deploy.sh"
          ssh -p "${PORT}" "${CPANEL_USER}@${CPANEL_HOST}" \
            "chmod +x /tmp/dudu-post-deploy.sh && /tmp/dudu-post-deploy.sh '${APP_PATH}' '${PUBLIC_PATH}' && rm -f /tmp/dudu-post-deploy.sh"